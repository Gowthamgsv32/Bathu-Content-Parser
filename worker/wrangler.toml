name = "bathu-content-parser"
main = "src/index.js"
compatibility_date = "2025-01-01"

[vars]
# Origin the frontend is served from (GitHub Pages). Update if you use a
# custom domain or different GitHub user/repo.
ALLOWED_ORIGIN = "https://gowthamgsv32.github.io"

# Secrets are NOT set here. Set them with:
#   wrangler secret put GEMINI_API_KEY
# GEMINI_API_KEY may be a single key or a comma-separated list of keys —
# the worker falls back to the next key on rate-limit/overload.
